name: Core tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: scripts/verify-core.sh

  macos-product-shell:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e '.[packaging]'
      - name: Build self-contained Core helper
        env:
          PROJECT_BRAIN_HELPER_DIST: ${{ runner.temp }}/helper-dist
          PROJECT_BRAIN_HELPER_WORK: ${{ runner.temp }}/helper-work
        run: scripts/build-macos-helper.sh
      - name: Verify frozen helper without a user environment
        run: |
          env -i HOME="$HOME" PATH=/usr/bin:/bin "${{ runner.temp }}/helper-dist/project-brain" --version
          env -i HOME="$HOME" PATH=/usr/bin:/bin "${{ runner.temp }}/helper-dist/project-brain" cli-contract --json
          env -i HOME="$HOME" PATH=/usr/bin:/bin "${{ runner.temp }}/helper-dist/project-brain" --runtime-root "${{ runner.temp }}/frozen-runtime" init --json
          env -i HOME="$HOME" PATH=/usr/bin:/bin "${{ runner.temp }}/helper-dist/project-brain" --runtime-root "${{ runner.temp }}/frozen-runtime" status --json
      - name: Verify real launchd lifecycle
        env:
          PROJECT_BRAIN_HELPER: ${{ runner.temp }}/helper-dist/project-brain
        run: python scripts/verify-macos-launchd-lifecycle.py
      - name: Run Swift model and adapter tests
        run: swift test --package-path apps/macos/ProjectBrain
      - name: Build and test Project Brain.app
        env:
          PROJECT_BRAIN_BUNDLED_HELPER: ${{ runner.temp }}/helper-dist/project-brain
        run: |
          xcodebuild \
            -project apps/macos/ProjectBrain/ProjectBrain.xcodeproj \
            -scheme ProjectBrain \
            -destination 'platform=macOS' \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test
          test -x "${{ runner.temp }}/DerivedData/Build/Products/Debug/Project Brain.app/Contents/Resources/project-brain"
          test -f "${{ runner.temp }}/DerivedData/Build/Products/Debug/Project Brain.app/Contents/Resources/project-brain-cli-contract.json"
          test -f "${{ runner.temp }}/DerivedData/Build/Products/Debug/Project Brain.app/Contents/Resources/tunnel-client-compatibility.json"
          test ! -e "${{ runner.temp }}/DerivedData/Build/Products/Debug/Project Brain.app/Contents/Resources/tunnel-client"
      - name: Build unsigned internal Local Tasks Build 9 DMG, ZIP, and manifest
        env:
          PROJECT_BRAIN_BUNDLED_HELPER: ${{ runner.temp }}/helper-dist/project-brain
          PROJECT_BRAIN_RC_DERIVED_DATA: ${{ runner.temp }}/RC1DerivedData
          PROJECT_BRAIN_RC_OUTPUT_DIR: ${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64
          PROJECT_BRAIN_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: scripts/build-rc-artifact.sh
      - name: Verify Build 9 manifest and artifact SHA-256
        run: python scripts/verify-rc-artifact.py "${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64"
      - name: Verify Build 9 mounted DMG installation layout
        run: scripts/verify-rc-dmg-layout.sh "${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64/Project-Brain-Local-Tasks-Build9-arm64.dmg"
      - name: Verify final DMG App and embedded helper local Analyze task and schema upgrade
        run: python scripts/verify-bundled-helper-local-task.py "${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64/Project-Brain-Local-Tasks-Build9-arm64.dmg" --evidence-output "${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64/build9-timing-evidence.json"
      - name: Verify final DMG and Applications copies have one process and management window
        run: scripts/verify-final-app-single-instance.sh "${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64/Project-Brain-Local-Tasks-Build9-arm64.dmg"
      - name: Verify Gmail legacy isolation
        run: git diff --exit-code 7259acfa1c38e30f3f8c2126eb7c7c3f8c271e3f -- experiments/gmail-inbox/
      - uses: actions/upload-artifact@v4
        with:
          name: Project-Brain-Local-Tasks-Build9-arm64
          path: ${{ runner.temp }}/Project-Brain-Local-Tasks-Build9-arm64
          retention-days: 7
